name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress runs finish; queue (don't cancel) so a deploy isn't interrupted.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the deploy on the SAME test suite CI runs. deploy.yml triggers on push
  # to main independently of ci.yml, so without this a red `npm test` could still
  # ship. build (and therefore deploy) waits on this passing.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # single source of truth (matches ci.yml)
          cache: npm
      - run: npm ci
      - name: Test
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          # Astro 6 requires Node >=22.12; the action defaults to 20. Keep this
          # in step with .nvmrc (local) and ci.yml.
          node-version: 24
        # Installs deps, runs `astro build`, and uploads the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
